# Neuro Newsletter Configuration
# Copy this file to config.yaml and fill in your API keys
#
# API key: set via env var ANTHROPIC_API_KEY (recommended) or here
anthropic_api_key: null  # or "sk-ant-..."

journals:
  # Specialty journals - fetch all papers
  neuromuscular:
    - "Neuromuscular Disorders"
    - "Muscle Nerve"
    - "Journal of Neuromuscular Diseases"
    - "Journal of the Peripheral Nervous System"
    - "Amyotrophic Lateral Sclerosis and Frontotemporal Degeneration"
    - "Journal of Clinical Neuromuscular Disease"
    - "Neurology Genetics"

  neurovascular:
    - "Stroke"
    - "International Journal of Stroke"
    - "Journal of Stroke and Cerebrovascular Diseases"
    - "Cerebrovascular Diseases"
    - "Journal of NeuroInterventional Surgery"
    - "Interventional Neuroradiology"

  general:
    - "Neurology"
    - "JAMA Neurology"
    - "Annals of Neurology"
    - "Brain"
    - "Lancet Neurology"
    - "Journal of Neurology, Neurosurgery, and Psychiatry"
    - "Journal of Neurology"
    - "European Journal of Neurology"
    - "Neurological Sciences"
    - "Current Neurology and Neuroscience Reports"

  subspecialty:
    - "Epilepsia"
    - "Movement Disorders"
    - "Cephalalgia"
    - "Multiple Sclerosis Journal"
    - "Alzheimer's & Dementia"
    - "Parkinsonism and Related Disorders"

  neuroimmunology:
    - "Neurology Neuroimmunology & Neuroinflammation"
    - "Journal of Neuroinflammation"
    - "Journal of Neuroimmunology"

  pediatric:
    - "Developmental Medicine and Child Neurology"
    - "Journal of Child Neurology"
    - "Pediatric Neurology"
    - "Neuropediatrics"
    - "European Journal of Paediatric Neurology"

  neuropathology:
    - "Acta Neuropathologica"
    - "Brain Pathology"
    - "Journal of Neuropathology and Experimental Neurology"
    - "Neuropathology and Applied Neurobiology"

  neuroimaging:
    - "NeuroImage"
    - "NeuroImage: Clinical"
    - "Human Brain Mapping"
    - "American Journal of Neuroradiology"
    - "Neuroradiology"

  neurocritical:
    - "Neurocritical Care"
    - "Journal of Neurotrauma"

  reviews:
    - "Nature Reviews Neurology"
    - "Current Opinion in Neurology"
    - "Neurotherapeutics"
    - "Annual Review of Neuroscience"

  # Adjacent field journals - filter for neurology keywords
  adjacent_neurosurgery:
    - "Neurosurgery"
    - "Journal of Neurosurgery"

  adjacent_rheumatology:
    - "Arthritis & Rheumatology"
    - "Annals of the Rheumatic Diseases"
    - "Rheumatology"

  # Mega-journals - filter for neurology keywords
  mega_journals:
    - "Nature"
    - "Science"
    - "Cell"
    - "N Engl J Med"
    - "Lancet"
    - "JAMA"
    - "Nature Medicine"
    - "Nature Neuroscience"
    - "Nature Communications"
    - "Science Translational Medicine"

# Keywords to filter adjacent neurosurgery papers (must match title/abstract)
adjacent_neurosurgery_keywords:
  - "neurocritical"
  - "neurointensive"
  - "brain injury"
  - "intracranial"
  - "subarachnoid"
  - "intracerebral"
  - "subdural"
  - "epidural"
  - "hydrocephalus"
  - "decompressive"
  - "craniectomy"
  - "ventriculostomy"
  - "brain death"
  - "cerebral edema"
  - "herniation"
  - "status epilepticus"

# Keywords to filter adjacent rheumatology papers (must match title/abstract)
adjacent_rheumatology_keywords:
  - "myositis"
  - "myopathy"
  - "dermatomyositis"
  - "polymyositis"
  - "inclusion body"
  - "inflammatory muscle"
  - "antisynthetase"
  - "anti-Jo"
  - "anti-MDA5"
  - "anti-Mi-2"
  - "anti-SRP"
  - "anti-HMGCR"
  - "necrotizing myopathy"
  - "immune-mediated necrotizing"
  - "muscle weakness"
  - "creatine kinase"
  - "rhabdomyolysis"

# Keywords to filter mega-journal papers (must match title/abstract)
mega_journal_keywords:
  - "neuro"
  - "brain"
  - "stroke"
  - "motor neuron"
  - "myopathy"
  - "neuropathy"
  - "dementia"
  - "epilepsy"
  - "parkinson"
  - "alzheimer"
  - "multiple sclerosis"
  - "migraine"
  - "seizure"
  - "cerebr"
  - "spinal"
  - "nerve"
  - "muscular dystrophy"
  - "ataxia"
  - "ALS"
  - "guillain"

lookback_days: 7
output_dir: "./output"

# Jekyll blog integration
blog_drafts:
  enabled: true
  drafts_dir: "../../_drafts"
  author: "Your Name"
  min_importance: 3

# Triage settings
triage:
  top_n: 20
  batch_size: 20

# Budget limit for API usage (in dollars)
budget_limit: 1.00

# Full text fetching settings
full_text:
  enabled: true
  unpaywall_email: "your.email@example.com"

# Institutional proxy settings
proxy:
  enabled: false
  url: null
  http_proxy: null
  https_proxy: null
  username: null
  password: null

# Zotero integration
zotero:
  enabled: false
  api_key: null  # Set via env var ZOTERO_API_KEY (recommended)
  library_id: null
  library_type: "user"
  add_notes: true
  attach_pdfs: true
